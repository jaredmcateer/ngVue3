name: Release
on:
  push:
    branches:
      - main
jobs:
  test:
    concurrency: ci-${{ github.ref }} # Recommended if you intend to make multiple deployments in quick succession.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup pnpm 💫
        uses: pnpm/action-setup@v4

      - name: Use Node.js 24.x 💻
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install Dependencies 🗂️
        run: pnpm install --frozen-lockfile

      - name: Test 🔬️
        run: pnpm test

  deploy-docs:
    concurrency: ci-${{ github.ref }} # Recommended if you intend to make multiple deployments in quick succession.
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup pnpm 💫
        uses: pnpm/action-setup@v4

      - name: Use Node.js 24.x 💻
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install Dependencies 🗂️
        run: pnpm install --frozen-lockfile

      - name: Build 🛠
        run: pnpm build

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4.3.3
        with:
          branch: gh-pages # The branch the action should deploy to.
          folder: apps/demo/dist/ # The folder the action should deploy.

  release:
    concurrency: ci-${{ github.ref }} # Recommended if you intend to make multiple deployments in quick succession.
    runs-on: ubuntu-latest
    needs: [test]
    permissions:
      contents: write # required for changesets to push release branches
      pull-requests: write # required for changesets to open Version Packages PRs
      id-token: write # required for npm OIDC trusted publishing
    steps:
      - name: Checkout 🛎
        uses: actions/checkout@v4
        with:
          # This makes action fetch all Git history so that Changesets can generate changelogs with the correct commits
          fetch-depth: 0

      - name: Setup pnpm 💫
        uses: pnpm/action-setup@v4

      - name: Use Node.js 24.x 💻
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - name: Ensure npm supports OIDC
        run: npm install -g npm@latest

      - name: Install Dependencies 🗂️
        run: pnpm install --frozen-lockfile

      - name: Build 🛠
        run: pnpm build

      # setup-node's registry-url writes an empty _authToken placeholder that
      # prevents npm from using OIDC; remove it so trusted publishing can run.
      - name: Prepare npm for OIDC trusted publishing
        run: |
          npm config delete //registry.npmjs.org/:_authToken --location=user 2>/dev/null || true
          npm config delete always-auth --location=user 2>/dev/null || true

      - name: Create Release Pull Request or Publish to npm 🚢
        uses: changesets/action@v1
        with:
          publish: pnpm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ""
