name: Tests
on:
  push:
    branches:
      - "*"
      - "*/*"
      - "**"
      - "!main"
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup pnpm 💫
        uses: pnpm/action-setup@v4

      - name: Use Node.js 24.x 💻
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install Dependencies 🗂️
        run: pnpm install --frozen-lockfile

      - name: Test 🔬️
        run: pnpm test
